<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ozone Enterprise Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#F9FAFB;color:#111827}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sidebar{width:220px;background:#002060;color:#fff;display:flex;flex-direction:column;transition:width .2s;flex-shrink:0}
.sidebar.collapsed{width:60px}
.sidebar-header{padding:16px 12px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:8px;min-height:56px}
.sidebar-logo{height:30px;filter:brightness(0) invert(1);flex-shrink:0}
.sidebar-toggle{margin-left:auto;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav{flex:1;padding:10px 6px;overflow-y:auto}
.nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;text-align:left;margin-bottom:2px;white-space:nowrap;overflow:hidden}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.nav-item:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-label{overflow:hidden;text-overflow:ellipsis}
.sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,.1)}
.user-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:8px}
.logout-btn{width:100%;padding:7px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;font-size:12px;cursor:pointer}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#002060;flex:1}
.search-wrap{position:relative;width:300px}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px}
.avatar{width:32px;height:32px;border-radius:50%;background:#002060;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.filterbar{background:#F8FAFF;border-bottom:1px solid #E5E7EB;padding:7px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.filterbar select{padding:5px 8px;border:1.5px solid #E5E7EB;border-radius:6px;font-size:12px;color:#002060;background:#fff;cursor:pointer}
.clear-btn{padding:5px 10px;border:1.5px solid #FCA5A5;border-radius:6px;font-size:12px;color:#DC2626;background:#FFF0F0;cursor:pointer}
.filter-label{font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px}
/* Page */
.page{flex:1;overflow-y:auto;padding:20px}
/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px 16px}
.kpi-label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-row{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-value{font-size:22px;font-weight:700;color:#002060;line-height:1}
.kpi-icon{font-size:18px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#EEF3FF}
.kpi-sub{font-size:11px;color:#9CA3AF;margin-top:4px}
/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px}
.chart-title{font-size:13px;font-weight:700;color:#002060;margin-bottom:12px}
.charts-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* Table */
.table-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden}
.table-header{padding:12px 16px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center}
.table-title{font-size:13px;font-weight:700;color:#002060}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#F8FAFF}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;border-bottom:1px solid #E5E7EB;white-space:nowrap}
tbody tr:nth-child(even){background:#FAFAFA}
tbody td{padding:9px 12px;border-bottom:1px solid #F3F4F6;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.table-footer{padding:10px 16px;border-top:1px solid #F3F4F6;background:#FAFAFA;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6B7280}
.pg-btn{padding:5px 10px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;font-size:12px;cursor:pointer}
.pg-btn.active{background:#002060;color:#fff;border-color:#002060}
/* Badges */
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.badge-green{background:#ECFDF5;color:#065F46}
.badge-red{background:#FEF2F2;color:#991B1B}
.badge-blue{background:#EFF6FF;color:#1D4ED8}
.badge-amber{background:#FFFBEB;color:#92400E}
.badge-purple{background:#F5F3FF;color:#5B21B6}
.badge-cyan{background:#E0F2FE;color:#0C4A6E}
.badge-gray{background:#F3F4F6;color:#374151}
/* Login */
.login-bg{min-height:100vh;background:linear-gradient(135deg,#002060 0%,#1a3a7a 60%,#0d2050 100%);display:flex;align-items:center;justify-content:center}
.login-card{width:420px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.4)}
.login-top{background:#002060;padding:30px 30px 22px;text-align:center}
.login-logo{height:48px;filter:brightness(0) invert(1);margin-bottom:14px}
.login-subtitle{color:#fff;font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.65}
.login-body{padding:30px}
.login-heading{font-size:22px;font-weight:700;color:#002060;margin-bottom:4px}
.login-desc{font-size:13px;color:#6B7280;margin-bottom:26px}
.field-label{font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field-input{width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;margin-bottom:14px}
.field-input:focus{border-color:#002060}
.login-btn{width:100%;padding:12px;background:#002060;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#003090}
.login-hint{margin-top:18px;padding:12px;background:#F8FAFF;border-radius:8px;font-size:12px;color:#555}
.err-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:13px;color:#DC2626;margin-bottom:14px}
/* Funnel */
.funnel-wrap{max-width:680px;margin:0 auto}
.funnel-stage{display:flex;flex-direction:column;align-items:center;margin-bottom:3px}
.funnel-bar{border-radius:8px;padding:12px 20px;color:#fff;display:flex;align-items:center;gap:12px;width:100%}
.funnel-connector{width:2px;height:10px;background:#E5E7EB}
/* Analytics */
.progress-row{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.progress-bg{height:6px;background:#F3F4F6;border-radius:4px}
.progress-fill{height:100%;border-radius:4px}
/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.form-section{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:18px}
.section-title{font-size:11px;font-weight:700;color:#002060;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #002060;padding-bottom:8px;margin-bottom:14px}
.form-field{margin-bottom:12px}
.form-field label{font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:13px;font-family:inherit}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:#002060;outline:none}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.btn-primary{padding:10px 28px;background:#002060;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-secondary{padding:10px 20px;border:1.5px solid #E5E7EB;background:#fff;border-radius:8px;font-size:13px;cursor:pointer}
.success-msg{background:#ECFDF5;border:1px solid #6EE7B7;border-radius:10px;padding:12px 16px;color:#065F46;font-weight:600;font-size:14px;margin-bottom:16px}
/* Settings tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid #E5E7EB;margin-bottom:18px}
.tab{padding:8px 16px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;cursor:pointer;color:#6B7280}
.tab.active{border-bottom-color:#002060;color:#002060;font-weight:700}
/* Misc */
.stat-chip{background:#F8FAFF;border-radius:6px;padding:8px 10px}
.stat-chip-label{font-size:10px;color:#9CA3AF;margin-bottom:2px}
.stat-chip-val{font-size:16px;font-weight:700;color:#002060}
.live-badge{font-size:12px;background:#ECFDF5;color:#065F46;padding:3px 12px;border-radius:20px;font-weight:600}
.export-btn{padding:6px 14px;background:#002060;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const LOGO = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 60'%3E%3Ccircle cx='30' cy='30' r='22' fill='%23C9A227'/%3E%3Ccircle cx='30' cy='30' r='14' fill='%23002060'/%3E%3Ctext x='62' y='42' font-family='Arial Black,sans-serif' font-size='32' font-weight='900' fill='%23002060'%3EOZONE%3C/text%3E%3C/svg%3E";
const NAVY="#002060",GOLD="#C9A227";
const ZONES=["North","South","East","West","Central"];
const ZMS={North:"Rajesh Kumar",South:"Priya Menon",East:"Amit Das",West:"Sunita Patil",Central:"Vikram Singh"};
const PRODUCTS=["Aluminium Doors & Windows","UPVC Windows"];
const PARTNERS=["BuildMart Delhi","GlassTech Mumbai","WindowWorld Pune","FencoIndia Hyderabad","ArchiGlass Kolkata","ProBuild Chennai","AlumFab Bangalore","VisionGlass Ahmedabad"];
const SALESPERSONS=["Ankit Sharma","Deepa Nair","Rohit Verma","Kavita Joshi","Suresh Pillai","Meena Iyer","Rahul Gupta","Sneha Reddy"];
const STATUSES=["Done","Done","Done","Survey","Production","Dispatch","Installation","Pending","Quotation Sent"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const CUSTOMERS=["Prestige Builders","Sobha Developers","DLF Homes","Godrej Properties","Puravankara Projects","Brigade Group","Mahindra Lifespace","Tata Housing","Lodha Group","Shapoorji Pallonji"];

function seed(i){let x=Math.sin(i+1)*10000;return x-Math.floor(x);}
const ALL_DATA=Array.from({length:120},(_,i)=>{
  const zone=ZONES[i%5];
  const prod=PRODUCTS[i%2];
  const stat=STATUSES[Math.floor(seed(i*3)*STATUSES.length)];
  const bv=Math.round((seed(i*7)*25+2)*100)/100;
  const mi=Math.floor(seed(i*11)*12);
  const d=new Date(2024,mi,Math.floor(seed(i*13)*27)+1);
  return{sno:i+1,zm:ZMS[zone],rsm:"RSM-"+zone,month:MONTHS[mi],quarter:"Q"+Math.ceil((mi+1)/3),year:2024,
    status:stat,product:prod,zone,salesPerson:SALESPERSONS[i%8],partner:PARTNERS[i%8],
    customer:CUSTOMERS[i%10],totalQty:Math.floor(seed(i*17)*18)+2,basicOrderValue:bv,
    totalOrderValue:Math.round(bv*1.18*100)/100,
    quotationNumber:"QT-2024-"+String(i+1).padStart(4,"0"),
    invoiceNo:stat==="Done"?"INV-2024-"+String(i+1).padStart(4,"0"):"",
    dateOfOrder:d.toLocaleDateString("en-IN"),
    advPct:30,survPct:20,despPct:50,location:"City-"+((i%10)+1),
    category:prod==="Aluminium Doors & Windows"?"Premium":"Standard"};
});

// ── HELPERS ───────────────────────────────────────────────────────────────
const fmt=n=>n>=1?"₹"+n.toFixed(1)+"L":"₹"+(n*100).toFixed(0)+"K";
const pct=(a,b)=>b===0?0:Math.round(a/b*100);
const uniq=(arr,k)=>[...new Set(arr.map(r=>r[k]))];

// ── STATE ─────────────────────────────────────────────────────────────────
let STATE={
  user:null,page:"dashboard",collapsed:false,
  search:"",
  filters:{zone:"All",product:"All",status:"All",month:"All"},
  orderPage:1,
  punchSubmitted:false,
  settingsTab:"datasource",
  formData:{}
};
function setState(patch){Object.assign(STATE,patch);render();}

function filteredData(){
  let d=ALL_DATA;
  const f=STATE.filters;
  if(f.zone!=="All") d=d.filter(r=>r.zone===f.zone);
  if(f.product!=="All") d=d.filter(r=>r.product===f.product);
  if(f.status!=="All") d=d.filter(r=>r.status===f.status);
  if(f.month!=="All") d=d.filter(r=>r.month===f.month);
  if(STATE.search){
    const q=STATE.search.toLowerCase();
    d=d.filter(r=>r.quotationNumber.toLowerCase().includes(q)||r.customer.toLowerCase().includes(q)||
      r.partner.toLowerCase().includes(q)||r.salesPerson.toLowerCase().includes(q)||
      r.zone.toLowerCase().includes(q)||r.product.toLowerCase().includes(q));
  }
  return d;
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
function renderLogin(){
  let user="",pass="",errEl=h("div",{class:"err-msg",style:{display:"none"}},"");
  const userInp=h("input",{class:"field-input",type:"text",placeholder:"admin / sales / ops"});
  const passInp=h("input",{class:"field-input",type:"password",placeholder:"ozone123"});
  userInp.addEventListener("input",e=>user=e.target.value);
  passInp.addEventListener("input",e=>pass=e.target.value);
  function doLogin(){
    if(!user||!pass){errEl.textContent="Please enter credentials.";errEl.style.display="block";return;}
    const map={admin:{name:"Admin User",role:"Administrator"},sales:{name:"Sales Manager",role:"Sales"},ops:{name:"Operations Head",role:"Operations"}};
    if(map[user]&&pass==="ozone123"){
      errEl.style.display="none";
      setState({user:map[user],page:"dashboard"});
    }else{errEl.textContent="Invalid credentials. Try admin/ozone123";errEl.style.display="block";}
  }
  passInp.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  return h("div",{class:"login-bg"},
    h("div",{class:"login-card"},
      h("div",{class:"login-top"},
        h("img",{class:"login-logo",src:LOGO,alt:"Ozone"}),
        h("div",{class:"login-subtitle"},"Enterprise Platform")
      ),
      h("div",{class:"login-body"},
        h("div",{class:"login-heading"},"Welcome back"),
        h("div",{class:"login-desc"},"Order Tracker & Business Intelligence"),
        errEl,
        h("label",{class:"field-label"},"USERNAME"),userInp,
        h("label",{class:"field-label"},"PASSWORD"),passInp,
        h("button",{class:"login-btn",onclick:doLogin},"Sign In →"),
        h("div",{class:"login-hint"},h("strong",{},"Demo accounts:")," admin · sales · ops (password: ozone123)")
      )
    )
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",icon:"⊞",label:"Executive Dashboard"},
  {id:"orders",icon:"📋",label:"Order Management"},
  {id:"funnel",icon:"△",label:"Sales Funnel"},
  {id:"analytics",icon:"📊",label:"Analytics"},
  {id:"partners",icon:"🤝",label:"Partner Performance"},
  {id:"payments",icon:"₹",label:"Payment Tracker"},
  {id:"punch",icon:"+",label:"Order Punch"},
  {id:"settings",icon:"⚙",label:"Settings & Admin"},
];
const TITLES={dashboard:"Executive Dashboard",orders:"Order Management",funnel:"Sales Funnel",analytics:"Analytics",partners:"Partner Performance",payments:"Payment Tracker",punch:"New Order",settings:"Settings & Admin"};

function renderSidebar(){
  const c=STATE.collapsed;
  const items=NAV.map(n=>{
    const el=h("button",{class:"nav-item"+(STATE.page===n.id?" active":""),onclick:()=>setState({page:n.id})},
      h("span",{class:"nav-icon"},n.icon),
      c?null:h("span",{class:"nav-label"},n.label)
    );
    return el;
  });
  const footer=c?null:h("div",{class:"sidebar-footer"},
    h("div",{class:"user-name"},STATE.user.name),
    h("div",{class:"user-role"},STATE.user.role),
    h("button",{class:"logout-btn",onclick:()=>setState({user:null,page:"dashboard"})},"Sign Out")
  );
  return h("div",{class:"sidebar"+(c?" collapsed":"")},
    h("div",{class:"sidebar-header"},
      c?null:h("img",{class:"sidebar-logo",src:LOGO,alt:"Ozone"}),
      h("button",{class:"sidebar-toggle",onclick:()=>setState({collapsed:!STATE.collapsed})},c?"›":"‹")
    ),
    h("nav",{class:"nav"},...items),
    footer
  );
}

// ── TOPBAR ────────────────────────────────────────────────────────────────
function renderTopbar(){
  const si=h("input",{type:"text",placeholder:"Search orders, partners, customers…",value:STATE.search,style:{width:"100%",padding:"8px 10px 8px 30px",border:"1.5px solid #E5E7EB",borderRadius:"8px",fontSize:"13px"}});
  si.value=STATE.search;
  si.addEventListener("input",e=>setState({search:e.target.value,orderPage:1}));
  return h("div",{class:"topbar"},
    h("div",{class:"topbar-title"},TITLES[STATE.page]),
    h("div",{class:"search-wrap"},
      h("span",{class:"search-icon"},"🔍"),si
    ),
    h("div",{class:"avatar"},STATE.user.name.charAt(0)),
    h("span",{style:{fontSize:"12px",color:"#6B7280"}},STATE.user.role)
  );
}

// ── FILTERBAR ─────────────────────────────────────────────────────────────
function renderFilterbar(){
  function sel(field,opts){
    const el=h("select",{onchange:e=>{const f={...STATE.filters};f[field]=e.target.value;setState({filters:f,orderPage:1});}},
      ...opts.map(o=>h("option",{value:o,selected:STATE.filters[field]===o?true:null},o))
    );
    return el;
  }
  return h("div",{class:"filterbar"},
    h("span",{class:"filter-label"},"Filters:"),
    sel("zone",["All",...ZONES]),
    sel("product",["All",...PRODUCTS]),
    sel("status",["All",...[...new Set(ALL_DATA.map(r=>r.status))]]),
    sel("month",["All",...MONTHS]),
    h("button",{class:"clear-btn",onclick:()=>setState({filters:{zone:"All",product:"All",status:"All",month:"All"},orderPage:1})},"✕ Clear")
  );
}

// ── SVG BAR CHART ─────────────────────────────────────────────────────────
function svgBar(data,xKey,yKey,color){
  if(!data.length) return h("div",{},"No data");
  const W=440,H=140,PAD=4;
  const maxV=Math.max(...data.map(d=>d[yKey]||0))||1;
  const bw=Math.floor((W-PAD*data.length)/data.length);
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+(H+22));
  svg.setAttribute("style","width:100%;height:"+(H+22)+"px");
  data.forEach((d,i)=>{
    const bh=Math.max(2,Math.round((d[yKey]||0)/maxV*(H-10)));
    const x=i*(bw+PAD)+2;
    const rect=document.createElementNS(ns,"rect");
    rect.setAttribute("x",x);rect.setAttribute("y",H-bh);
    rect.setAttribute("width",bw);rect.setAttribute("height",bh);
    rect.setAttribute("rx","3");rect.setAttribute("fill",color);
    rect.setAttribute("opacity","0.85");
    svg.appendChild(rect);
    const txt=document.createElementNS(ns,"text");
    txt.setAttribute("x",x+bw/2);txt.setAttribute("y",H+16);
    txt.setAttribute("text-anchor","middle");txt.setAttribute("font-size","9");txt.setAttribute("fill","#6B7280");
    txt.textContent=String(d[xKey]).slice(0,3);
    svg.appendChild(txt);
  });
  return svg;
}

function svgHBar(data,xKey,yKey,color){
  if(!data.length) return h("div",{},"No data");
  const ns="http://www.w3.org/2000/svg";
  const H=data.length*28+10;
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 440 "+H);
  svg.setAttribute("style","width:100%;height:"+H+"px");
  const maxV=Math.max(...data.map(d=>d[yKey]||0))||1;
  data.forEach((d,i)=>{
    const bw=Math.round((d[yKey]||0)/maxV*280);
    const y=i*28+4;
    const lbl=document.createElementNS(ns,"text");
    lbl.setAttribute("x","0");lbl.setAttribute("y",y+16);
    lbl.setAttribute("font-size","11");lbl.setAttribute("fill","#374151");
    lbl.textContent=String(d[xKey]).slice(0,10);
    svg.appendChild(lbl);
    const rect=document.createElementNS(ns,"rect");
    rect.setAttribute("x","90");rect.setAttribute("y",y);
    rect.setAttribute("width",bw);rect.setAttribute("height","18");
    rect.setAttribute("rx","3");rect.setAttribute("fill",color);rect.setAttribute("opacity","0.85");
    svg.appendChild(rect);
    const vt=document.createElementNS(ns,"text");
    vt.setAttribute("x",String(96+bw));vt.setAttribute("y",y+13);
    vt.setAttribute("font-size","10");vt.setAttribute("fill","#6B7280");
    vt.textContent=fmt(d[yKey]||0);
    svg.appendChild(vt);
  });
  return svg;
}

// ── DONUT CHART ───────────────────────────────────────────────────────────
function donutChart(segments){
  const total=segments.reduce((s,d)=>s+(d.value||0),0)||1;
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 120 120");
  svg.setAttribute("style","width:100px;height:100px;display:block;margin:0 auto");
  let angle=-Math.PI/2;
  segments.forEach(seg=>{
    const a=(seg.value||0)/total*2*Math.PI;
    const x1=60+52*Math.cos(angle),y1=60+52*Math.sin(angle);
    const x2=60+52*Math.cos(angle+a),y2=60+52*Math.sin(angle+a);
    const ix1=60+36*Math.cos(angle+a),iy1=60+36*Math.sin(angle+a);
    const ix2=60+36*Math.cos(angle),iy2=60+36*Math.sin(angle);
    const lg=a>Math.PI?1:0;
    const path=document.createElementNS(ns,"path");
    path.setAttribute("d","M"+x1+","+y1+" A52,52 0 "+lg+" 1 "+x2+","+y2+" L"+ix1+","+iy1+" A36,36 0 "+lg+" 0 "+ix2+","+iy2+" Z");
    path.setAttribute("fill",seg.color);
    svg.appendChild(path);
    angle+=a;
  });
  const pctTxt=document.createElementNS(ns,"text");
  pctTxt.setAttribute("x","60");pctTxt.setAttribute("y","65");
  pctTxt.setAttribute("text-anchor","middle");pctTxt.setAttribute("font-size","11");
  pctTxt.setAttribute("fill",NAVY);pctTxt.setAttribute("font-weight","600");
  pctTxt.textContent=pct(segments[0]?.value||0,total)+"%";
  svg.appendChild(pctTxt);
  return svg;
}

              h("td",{style:{color:NAVY,fontWeight:"600",padding:"9px 12px"}},r.quotationNumber),
              h("td",{style:{padding:"9px 12px"}},r.customer),
              h("td",{style:{padding:"9px 12px"}},r.partner),
              h("td",{style:{fontWeight:"600",padding:"9px 12px"}},fmt(r.basicOrderValue)),
              h("td",{style:{padding:"9px 12px"}},fmt(r.basicOrderValue*0.3)),
              h("td",{style:{padding:"9px 12px"}},fmt(r.basicOrderValue*0.2)),
              h("td",{style:{padding:"9px 12px"}},fmt(r.basicOrderValue*0.5)),
              h("td",{style:{padding:"9px 12px"}},h("span",{class:"badge "+(r.status==="Done"?"badge-green":"badge-red")},r.status==="Done"?"Cleared":"Pending"))
            )
          ))
        )
      )
    )
  );
}

// ── ORDER PUNCH ───────────────────────────────────────────────────────────
function renderPunch(){
  const F=STATE.formData;
  function field(label,key,type,opts){
    const lbl=h("label",{},label);
    let inp;
    if(opts){
      inp=h("select",{onchange:e=>{STATE.formData[key]=e.target.value;}},
        h("option",{value:""},"— Select —"),
        ...opts.map(o=>{const opt=h("option",{value:o},o);if(F[key]===o)opt.selected=true;return opt;})
      );
    } else {
      inp=h("input",{type:type||"text",value:F[key]||"",oninput:e=>{STATE.formData[key]=e.target.value;}});
    }
    return h("div",{class:"form-field"},lbl,inp);
  }
  const success=STATE.punchSubmitted?h("div",{class:"success-msg"},"✅ Order punched successfully! Syncing to data source…"):null;
  return h("div",{class:"page"},
    success,
    h("div",{class:"form-grid"},
      h("div",{class:"form-section"},
        h("div",{class:"section-title"},"📋 Order Information"),
        field("Date of Order","dateOfOrder","date"),
        field("Quotation Number","quotationNumber"),
        field("Year","year","text",["2023","2024","2025"]),
        field("Month","month","text",MONTHS),
        field("Quarter","quarter","text",["Q1","Q2","Q3","Q4"]),
        field("Status","status","text",["Pending","Quotation Sent","Survey","Production","Dispatch","Installation","Done"]),
        field("Enquiry Source","enquirySource","text",["Ozone","Partner"]),
        field("Item Type","itemType","text",["Kit","Customised"])
      ),
      h("div",{class:"form-section"},
        h("div",{class:"section-title"},"👤 Customer & Product"),
        field("Customer Name (Ship To)","customer"),
        field("Product","product","text",PRODUCTS),
        field("Category","category","text",["Premium","Standard","Economy"]),
        field("Color","color"),
        field("Total Qty","totalQty","number"),
        field("Basic Order Value (₹ Lakhs)","basicOrderValue","number"),
        field("Address","address"),
        field("Location","location"),
        field("Invoice No","invoiceNo")
      ),
      h("div",{class:"form-section"},
        h("div",{class:"section-title"},"🏢 Team & Assignment"),
        field("Zone","zone","text",ZONES),
        field("Zonal Manager (ZM)","zm"),
        field("Regional Sales Manager","rsm"),
        field("Sales Person","salesPerson","text",SALESPERSONS),
        field("Ozo Blu Partner (SAP)","partner","text",PARTNERS),
        field("SO Number","soNumber"),
        field("SAP FG Code","sapFgCode"),
        field("Technical Validation","technicalValidation"),
        h("div",{class:"form-field"},
          h("label",{},"Final Remark"),
          h("textarea",{rows:"3",oninput:e=>{STATE.formData.finalRemark=e.target.value;},style:{width:"100%",padding:"8px 10px",border:"1.5px solid #E5E7EB",borderRadius:"7px",fontSize:"13px",fontFamily:"inherit",resize:"vertical"}},F.finalRemark||"")
        )
      )
    ),
    h("div",{class:"form-actions"},
      h("button",{class:"btn-secondary",onclick:()=>setState({formData:{},punchSubmitted:false})},"Clear Form"),
      h("button",{class:"btn-primary",onclick:()=>{
        if(!STATE.formData.customer||!STATE.formData.basicOrderValue){alert("Please fill Customer Name and Basic Order Value.");return;}
        setState({punchSubmitted:true});
        setTimeout(()=>setState({punchSubmitted:false,formData:{}}),3000);
      }},"✓ Submit Order")
    )
  );
}

// ── SETTINGS ─────────────────────────────────────────────────────────────
function renderSettings(){
  const t=STATE.settingsTab;
  function tab(id,label){return h("button",{class:"tab"+(t===id?" active":""),onclick:()=>setState({settingsTab:id})},label);}
  let content;
  if(t==="datasource"){
    let sheetUrl="";
    const urlInp=h("input",{type:"text",placeholder:"https://docs.google.com/spreadsheets/d/…",style:{width:"100%",padding:"9px 12px",border:"1.5px solid #E5E7EB",borderRadius:"7px",fontSize:"13px",marginBottom:"12px",fontFamily:"inherit"},oninput:e=>{sheetUrl=e.target.value;}});
    const statusDiv=h("div",{style:{marginTop:"10px"}});
    content=h("div",{style:{maxWidth:"600px"}},
      h("div",{class:"chart-card"},
        h("div",{class:"chart-title"},"Google Sheets Integration"),
        h("p",{style:{fontSize:"12px",color:"#6B7280",marginBottom:"16px"}},"Connect your live Google Sheet as the real-time data source for all dashboards."),
        h("label",{style:{fontSize:"11px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"5px",textTransform:"uppercase"}},"SHEET URL OR ID"),
        urlInp,
        h("button",{class:"btn-primary",style:{padding:"9px 18px"},onclick:()=>{
          statusDiv.innerHTML="";
          statusDiv.appendChild(h("div",{style:{padding:"10px 14px",background:"#ECFDF5",borderRadius:"7px",fontSize:"12px",color:"#065F46",marginTop:"10px"}},"✅ Sheet connected. Auto-sync enabled every 5 minutes."));
        }},"Connect Sheet"),
        statusDiv
      ),
      h("div",{class:"chart-card",style:{marginTop:"14px"}},
        h("div",{class:"chart-title"},"System Status"),
        ...[["Data Source","Connected (Demo)","#10B981"],["Last Sync","Just now","#6B7280"],["Total Records","120","#6B7280"],["Schema Version","94 columns · v1.0","#6B7280"]].map(([k,v,c])=>
          h("div",{style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #F3F4F6",fontSize:"13px"}},
            h("span",{style:{color:"#6B7280"}},k),h("span",{style:{fontWeight:"600",color:c}},v)
          )
        )
      )
    );
  } else if(t==="columns"){
    const cols=[
      [1,"ZM","Text","Zone Manager field"],
      [3,"Month","Text","Filters, Trend Charts"],
      [8,"Status","Text","Order Status KPIs"],
      [10,"S.No.","Number","Order Count KPI"],
      [16,"Sales Person","Text","Sales Leaderboard"],
      [19,"Product","Text","Product Analytics"],
      [22,"Total Qty","Number","Qty KPIs"],
      [25,"Basic Order Value","Currency","Revenue KPIs"],
      [30,"Total Order Value","Currency","Commercial Reports"],
      [33,"Zone","Text","Zone Filters & Charts"],
      [34,"Quotation Number","Text","Search & Tracking"],
      [67,"Production Order","Date","Funnel Stage"],
      [85,"Despatch Date","Date","Dispatch Stage"],
      [93,"Handover","Date","Completion Stage"],
    ];
    content=h("div",{class:"table-wrap"},
      h("table",{},
        h("thead",{},h("tr",{},...["#","Column Name","Type","Mapped To","Status"].map(c=>h("th",{},c)))),
        h("tbody",{},...cols.map(([n,col,type,mapped])=>
          h("tr",{},
            h("td",{style:{color:"#9CA3AF"}},n),
            h("td",{style:{fontWeight:"600",color:NAVY}},col),
            h("td",{style:{color:"#6B7280"}},type),
            h("td",{},mapped),
            h("td",{},h("span",{class:"badge badge-green"},"Active"))
          )
        ))
      )
    );
  } else if(t==="users"){
    content=h("div",{style:{maxWidth:"600px"}},
      h("div",{class:"chart-card"},
        h("div",{class:"chart-title"},"Platform Users"),
        ...[["Admin User","Administrator","Full Access"],["Sales Manager","Sales","Dashboard + Orders + Punch"],["Operations Head","Operations","Orders + Funnel + Analytics"]].map((u,i)=>
          h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",borderBottom:"1px solid #F3F4F6"}},
            h("div",{style:{width:"36px",height:"36px",borderRadius:"50%",background:NAVY,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700",fontSize:"14px",flexShrink:"0"}},u[0].charAt(0)),
            h("div",{style:{flex:"1"}},
              h("div",{style:{fontSize:"13px",fontWeight:"600"}},u[0]),
              h("div",{style:{fontSize:"11px",color:"#9CA3AF"}},u[2])
            ),
            h("span",{class:"badge badge-blue"},u[1])
          )
        )
      )
    );
  } else {
    const items=t==="kpis"
      ?["Total Orders","Total Window Qty","Total Order Value","Completed Orders","Completed Value","Pending Orders","Pending Value","Aluminium Qty","UPVC Qty"]
      :["Zone","Product","Status","Month","Quarter","Sales Person","Partner","Customer"];
    content=h("div",{class:"chart-card"},
      h("div",{class:"chart-title"},t==="kpis"?"KPI Configuration":"Filter Configuration"),
      h("p",{style:{fontSize:"12px",color:"#6B7280",marginBottom:"14px"}},"All items auto-mapped from the connected data source."),
      h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},
        ...items.map(k=>h("div",{style:{background:"#F8FAFF",border:"1px solid #E5E7EB",borderRadius:"8px",padding:"8px 14px",fontSize:"12px",color:NAVY,fontWeight:"600"}},"✓ "+k))
      )
    );
  }
  return h("div",{class:"page"},
    h("div",{class:"tabs"},
      tab("datasource","Data Source"),tab("columns","Column Mapping"),tab("kpis","KPI Config"),tab("users","Users"),tab("filters","Filters")
    ),
    content
  );
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";
  if(!STATE.user){root.appendChild(renderLogin());return;}
  const showFilter=!["punch","settings"].includes(STATE.page);
  const pageMap={dashboard:renderDashboard,orders:renderOrders,funnel:renderFunnel,analytics:renderAnalytics,partners:renderPartners,payments:renderPayments,punch:renderPunch,settings:renderSettings};
  root.appendChild(
    h("div",{class:"app"},
      renderSidebar(),
      h("div",{class:"main"},
        renderTopbar(),
        showFilter?renderFilterbar():null,
        (pageMap[STATE.page]||renderDashboard)()
      )
    )
  );
}

render();
</script>
</body>
</html>

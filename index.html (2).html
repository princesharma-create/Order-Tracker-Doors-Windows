<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozone — Order Management</title>
<!-- Ozone Platform v4.0 | Built: 2026-06-18 | Fixes: row-filter, labels, export -->
<style>
/* ━━━ RESET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f0f2f5; color: #1a1f36; height: 100vh; overflow: hidden; }
input, select, textarea, button { font-family: inherit; font-size: 13px; }
button { cursor: pointer; }
a { color: #2563eb; text-decoration: none; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c8cdd8; border-radius: 4px; }

/* ━━━ APP SHELL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#shell {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#sidebar {
  width: 220px;
  min-width: 220px;
  max-width: 220px;
  flex-shrink: 0;
  background: #1e3a5f;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#sidebar.slim {
  width: 52px;
  min-width: 52px;
  max-width: 52px;
}
#content-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#topbar {
  height: 52px;
  min-height: 52px;
  background: #ffffff;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
}
#filterbar {
  background: #ffffff;
  border-bottom: 1px solid #e2e8f0;
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
#page-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ━━━ SIDEBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sb-header {
  height: 52px;
  min-height: 52px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  gap: 10px;
}
.sb-logo { color: #ffffff; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; }
.sb-logo small { display: block; font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; }
.sb-toggle { margin-left: auto; background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.7); border-radius: 4px; width: 26px; height: 26px; font-size: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.sb-toggle:hover { background: rgba(255,255,255,0.15); }
.sb-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.sb-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 4px; }
.sb-group-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 8px 4px; white-space: nowrap; overflow: hidden; }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 8px 10px; border-radius: 5px;
  border: none; background: transparent;
  color: rgba(255,255,255,0.65); text-align: left;
  margin-bottom: 1px; overflow: hidden; white-space: nowrap;
  font-size: 13px;
}
.nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-btn.active { background: #2563eb; color: #fff; font-weight: 500; }
.nav-icon { width: 20px; text-align: center; flex-shrink: 0; font-size: 14px; }
.nav-label { overflow: hidden; text-overflow: ellipsis; }
.sb-footer { padding: 12px 10px; border-top: 1px solid rgba(255,255,255,0.1); }
.sb-user { display: flex; align-items: center; gap: 9px; overflow: hidden; }
.sb-avatar { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; background: rgba(255,255,255,0.12); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.sb-user-info { overflow: hidden; }
.sb-user-name { color: #fff; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-role { color: rgba(255,255,255,0.4); font-size: 10px; }
.sb-logout { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 6px; display: block; padding: 0; text-align: left; }
.sb-logout:hover { color: #fff; }

/* ━━━ TOPBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.topbar-title { font-size: 15px; font-weight: 600; color: #1a1f36; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 260px; padding: 6px 10px 6px 30px;
  border: 1px solid #e2e8f0; border-radius: 6px;
  background: #f8fafc; color: #1a1f36; font-size: 13px;
}
.search-wrap input:focus { border-color: #2563eb; background: #fff; outline: none; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 12px; pointer-events: none; }
.ds-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.ds-live { background: #dcfce7; color: #166534; }
.ds-demo { background: #fef9c3; color: #854d0e; }

/* ━━━ FILTER BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.filter-label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.6px; margin-right: 4px; padding-bottom: 6px; }
.filter-groups { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-group-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-sel { padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; color: #1a1f36; cursor: pointer; font-size: 12px; min-width: 110px; }
.filter-sel:focus { border-color: #2563eb; outline: none; }
.btn-ghost { padding: 5px 10px; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; color: #64748b; font-size: 12px; align-self: flex-end; }
.btn-ghost:hover { background: #f1f5f9; }
.filter-clear-btn { margin-bottom: 1px; }
.filter-active { background: #fff1f2 !important; border-color: #fecaca !important; color: #dc2626 !important; font-weight: 600; }
/* Export button */
.export-menu { position: relative; display: inline-block; }
.export-btn-main { padding: 6px 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 12px; color: #374151; display: flex; align-items: center; gap: 5px; }
.export-btn-main:hover { background: #f8fafc; }
.export-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 100; min-width: 140px; overflow: hidden; }
.export-menu:hover .export-dropdown, .export-menu.open .export-dropdown { display: block; }
.export-option { display: block; width: 100%; padding: 9px 14px; text-align: left; border: none; background: transparent; font-size: 12px; color: #374151; cursor: pointer; }
.export-option:hover { background: #f8fafc; }

/* ━━━ KPI CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 14px 16px; border-left: 3px solid #e2e8f0; overflow: hidden; min-width: 0; }
.kpi-card.blue  { border-left-color: #2563eb; }
.kpi-card.green { border-left-color: #16a34a; }
.kpi-card.amber { border-left-color: #d97706; }
.kpi-card.red   { border-left-color: #dc2626; }
.kpi-card.purple{ border-left-color: #7c3aed; }
.kpi-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.kpi-value { font-size: 17px; font-weight: 700; color: #1a1f36; line-height: 1.1; word-break: break-all; }
.kpi-sub   { font-size: 11px; color: #94a3b8; margin-top: 3px; }

/* ━━━ PANELS / CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 13px; font-weight: 600; color: #1a1f36; }
.panel-meta { font-size: 11px; color: #94a3b8; }
.panel-body { padding: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ━━━ DATA TABLE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: #f8fafc; padding: 9px 12px;
  text-align: left; font-size: 11px; font-weight: 700;
  color: #64748b; white-space: nowrap;
  border-bottom: 2px solid #e2e8f0;
}
thead th.sortable { cursor: pointer; user-select: none; }
thead th.sortable:hover { color: #2563eb; }
tbody tr { border-bottom: 1px solid #f1f5f9; }
tbody tr:hover { background: #f8fafc; }
tbody td { padding: 9px 12px; color: #1a1f36; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.muted { color: #94a3b8; }
td.primary { color: #2563eb; font-weight: 600; }
.tbl-footer { padding: 10px 16px; border-top: 1px solid #f1f5f9; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
.tbl-info { font-size: 11px; color: #94a3b8; }
.pg { display: flex; gap: 3px; }
.pg-btn { padding: 4px 9px; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; color: #374151; font-size: 12px; }
.pg-btn:hover { background: #f1f5f9; }
.pg-btn.on { background: #2563eb; color: #fff; border-color: #2563eb; }

/* ━━━ BADGES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-done     { background: #dcfce7; color: #166534; }
.b-pending  { background: #fef3c7; color: #92400e; }
.b-quote    { background: #f1f5f9; color: #475569; }
.b-survey   { background: #dbeafe; color: #1e40af; }
.b-prod     { background: #ede9fe; color: #5b21b6; }
.b-dispatch { background: #fef9c3; color: #713f12; }
.b-install  { background: #d1fae5; color: #065f46; }
.b-won      { background: #d1fae5; color: #065f46; }

/* ━━━ BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn { padding: 7px 16px; border-radius: 5px; font-size: 13px; font-weight: 500; border: none; display: inline-flex; align-items: center; gap: 5px; }
.btn:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #fff; color: #374151; border: 1px solid #e2e8f0; }
.btn-secondary:hover { background: #f8fafc; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-success { background: #16a34a; color: #fff; }

/* ━━━ FORMS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.form-section { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px 20px; margin-bottom: 14px; }
.form-section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { margin-bottom: 0; }
.field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 7px 10px;
  border: 1px solid #e2e8f0; border-radius: 5px;
  background: #f8fafc; color: #1a1f36;
  transition: border-color 0.15s, background 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: #2563eb; background: #fff;
  outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.field textarea { resize: vertical; min-height: 56px; }
.form-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 16px; margin-top: 4px; border-top: 1px solid #f1f5f9; }

/* ━━━ ALERTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.alert { padding: 10px 14px; border-radius: 5px; font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
.alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.alert-error   { background: #fff1f2; border: 1px solid #fecaca; color: #991b1b; }
.alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
.alert-warn    { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

/* ━━━ PROGRESS BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.prog { margin-bottom: 12px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 5px; }
.prog-meta strong { color: #1a1f36; }
.prog-track { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; background: #2563eb; }

/* ━━━ FUNNEL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.funnel-wrap { max-width: 600px; margin: 0 auto; }
.funnel-row { display: flex; flex-direction: column; align-items: center; }
.funnel-bar { border-radius: 4px; padding: 11px 18px; display: flex; align-items: center; justify-content: space-between; color: #fff; font-size: 13px; }
.funnel-gap { width: 2px; height: 8px; background: #e2e8f0; }

/* ━━━ MODAL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.5);
  z-index: 1000; display: flex; align-items: flex-start;
  justify-content: center; overflow-y: auto; padding: 32px 16px;
}
.modal-box { background: #fff; border-radius: 8px; width: 860px; max-width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-header { padding: 14px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 14px; font-weight: 600; color: #1a1f36; }
.modal-close { background: none; border: none; font-size: 20px; color: #94a3b8; line-height: 1; padding: 0 4px; }
.modal-close:hover { color: #1a1f36; }
.modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
.modal-footer { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; justify-content: flex-end; }
.modal-section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid #f1f5f9; padding-bottom: 7px; margin-bottom: 12px; margin-top: 18px; }
.modal-section-title:first-child { margin-top: 0; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }

/* ━━━ SETTINGS WIZARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.wiz-steps { display: flex; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
.wiz-step { flex: 1; padding: 10px 8px; text-align: center; background: #f8fafc; border-right: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; }
.wiz-step:last-child { border-right: none; }
.wiz-step.done { background: #f0fdf4; color: #166534; font-weight: 600; }
.wiz-step.active { background: #eff6ff; color: #2563eb; font-weight: 700; }
.wiz-num { font-size: 16px; margin-bottom: 2px; }
.code-box { background: #0f172a; border-radius: 5px; padding: 14px; font-family: monospace; font-size: 11px; color: #cbd5e1; line-height: 1.65; overflow-x: auto; white-space: pre; margin: 10px 0; position: relative; }
.copy-btn { position: absolute; top: 8px; right: 8px; padding: 3px 9px; background: rgba(255,255,255,0.1); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; font-size: 11px; cursor: pointer; }
.copy-btn:hover { background: rgba(255,255,255,0.18); }

/* ━━━ LOGIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

function rnd(n) { let x = Math.sin(n + 1) * 43758.5453123; return x - Math.floor(x); }

function buildDemo() {
  return Array.from({length:120}, (_,i) => {
    const z = ZONES[i % 5];
    const mi = Math.floor(rnd(i*11) * 12);
    const st = STATUSES[Math.floor(rnd(i*3) * STATUSES.length)];
    const bv = Math.round((rnd(i*7) * 24 + 1.5) * 100) / 100;
    const dd = new Date(2024, mi, Math.floor(rnd(i*13)*27)+1);
    const r = {};
    SCH.forEach(s => r[s.k] = '');
    Object.assign(r, {
      sno: i+1,
      zm: ZMS_MAP[z], rsm: RSMS[z],
      month: MONTHS[mi], quarter: 'Q'+Math.ceil((mi+1)/3), year: '2024',

      advance:30, survey:20, despatch:50,
      category: PRODUCTS[i%2]==='Aluminium Doors & Windows' ? 'Premium' : 'Standard',
    });
    return r;
  });
}

function isValidRow(r) {
  // A row is valid if it has at least one meaningful data field
  const sno = parseInt(r.sno);
  const bov = parseFloat(r.basicOrderValue);
  const cust = String(r.customer || '').trim();
  const quot = String(r.quotationNo || '').trim();
  return (sno > 0) || (bov > 0) || (cust.length > 2) || (quot.length > 2);
}
function allRows() {
  const base = S.liveData || DEMO;
  // Always filter invalid/empty rows at runtime
  const clean = base.filter(isValidRow);
  return [...clean, ...S.sessionOrders];
}

function filtered() {
  let d = allRows();
  const f = S.filters;
  if (f.zone    !== 'All') d = d.filter(r => r.zone    === f.zone);
  if (f.product !== 'All') d = d.filter(r => r.product === f.product);
  if (f.status  !== 'All') d = d.filter(r => r.status  === f.status);
  if (f.month   !== 'All') d = d.filter(r => r.month   === f.month);
  if (S.search) {
    const q = S.search.toLowerCase();
    d = d.filter(r =>
      [r.quotationNo,r.customer,r.partner,r.salesPerson,r.zone,r.product,r.invoiceNo,r.soNumber]
        .some(v => v && String(v).toLowerCase().includes(q))
    );
  }
  return d;
}

  if(v===0) return '—';
  if(v>=100)  return '₹'+Math.round(v)+'L';      // large: no decimals
  if(v>=10)   return '₹'+v.toFixed(1)+'L';       // medium: 1 decimal
  return '₹'+v.toFixed(2)+'L';                   // small: 2 decimals
};

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function el(tag, props, ...kids) {
  const e = document.createElement(tag);
  if (props) for (const [k,v] of Object.entries(props)) {
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids.flat(9)) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number'
      ? document.createTextNode(String(c)) : c);
  }
  return e;
}
function txt(s) { return document.createTextNode(s); }

═══════════════════════════════════════════════════════ */
function extractId(raw) {
  raw = (raw||'').trim();
  const m = raw.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{25,}$/.test(raw)) return raw;
  return null;
}
function csvUrl(id, tab) {
  return 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv'+(tab?'&sheet='+encodeURIComponent(tab):'');
}
function parseCSV(txt) {
  const lines=[]; let cur=[],f='',inQ=false;
  for (let i=0;i<txt.length;i++) {
    const c=txt[i];
    if (inQ) { if(c==='"'&&txt[i+1]==='"'){f+='"';i++;}else if(c==='"')inQ=false;else f+=c; }
    else { if(c==='"')inQ=true;else if(c===','){cur.push(f.trim());f='';}
    else if(c==='\n'||c==='\r'){if(c==='\r'&&txt[i+1]==='\n')i++;cur.push(f.trim());f='';
    if(cur.some(v=>v))lines.push(cur);cur=[];}else f+=c; }
  }
  cur.push(f.trim()); if(cur.some(v=>v))lines.push(cur);
  return lines;
}
const COL_RX = {
  sno:/^s\.?no|^serial/i, zm:/^zm$|^zonal\s*(mgr|manager)/i, rsm:/^rsm$/i,
  month:/^month$/i, quarter:/^q(tr|uarter)/i, year:/^year$/i, status:/^status$/i,
  product:/^product\s*1?$|^product\s*cat|^product\s*type/i, zone:/^zone$/i,
  salesPerson:/^sales\s*(person|exec)|^se$/i, partner:/^ozo\s*blu|^partner\s*name/i,
  customer:/^customer\s*name|^ship\s*to/i, totalQty:/^total\s*qty/i,
  basicOrderValue:/^basic\s*order\s*value/i, totalOrderValue:/^total\s*order\s*value/i,
  quotationNo:/^quotation/i, invoiceNo:/^invoice/i,
  dateOfOrder:/^date.*(of\s*)?order|^order\s*date/i,
};
function autoMap(hdrs) {
  const m={};
  hdrs.forEach((h,i)=>{ for(const[f,rx] of Object.entries(COL_RX)){if(rx.test(h.trim())&&m[f]===undefined)m[f]=i;} });
  return m;
}
function rowToRec(cells, map, idx) {
  const g=(f,def='')=>{const i=map[f];return i!==undefined&&cells[i]!==undefined?String(cells[i]).trim():def;};
  // Read raw value — conversion to Lakhs happens after all rows loaded
  const bv=parseFloat(g('basicOrderValue','0'))||0;
  const r={}; SCH.forEach(s=>r[s.k]='');
  Object.assign(r,{sno:parseInt(g('sno',idx))||idx,zm:g('zm'),rsm:g('rsm'),month:g('month'),
    quarter:g('quarter'),year:g('year','2024'),status:g('status','Pending'),product:g('product','Aluminium Doors & Windows'),
    zone:g('zone'),salesPerson:g('salesPerson'),partner:g('partner'),customer:g('customer'),
    totalQty:parseInt(g('totalQty','0'))||0,basicOrderValue:bv,basicOVL:bv,
    totalOrderValue:parseFloat(g('totalOrderValue',+(bv*1.18).toFixed(2)))||+(bv*1.18).toFixed(2),
    quotationNo:g('quotationNo'),invoiceNo:g('invoiceNo'),dateOfOrder:g('dateOfOrder'),
    advance:30,survey:20,despatch:50,category:g('category'),
  });
  return r;
}

function fetchGViz(id, tab) {
  return new Promise((res,rej)=>{
    const cb='__ozGV'+Date.now();
    const url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&callback='+cb+(tab?'&sheet='+encodeURIComponent(tab):'');
    const sc=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('Timeout (15s). Ensure sheet is publicly shared as Anyone → Viewer.'));},15000);
    function cleanup(){clearTimeout(t);sc.remove();try{delete window[cb];}catch(e){}}
    window[cb]=function(d){
      cleanup();
      try {
        if(!d||!d.table) return rej(new Error('No table returned. Check sharing settings.'));
        const cols=(d.table.cols||[]).map(c=>c.label||c.id||'');
        const map=autoMap(cols);
        const allRecs=(d.table.rows||[]).map((row,i)=>{
          const cells=(row.c||[]).map(c=>c&&c.v!=null?String(c.v):'');
          return rowToRec(cells,map,i+1);
        });
        // Filter out empty/invalid rows
        const recs=allRecs.filter(r=>
          (r.sno&&r.sno>0) ||
          (r.customer&&r.customer.trim()) ||
          (r.quotationNo&&r.quotationNo.trim()) ||
          (r.basicOrderValue&&parseFloat(r.basicOrderValue)>0)
        );
        // Auto-detect scale: if avg basicOrderValue > 1000, values are in rupees not lakhs
        // Convert to Lakhs for consistent display
        const validVals=recs.map(r=>parseFloat(r.basicOrderValue)||0).filter(v=>v>0);
        const avgVal=validVals.length?validVals.reduce((a,b)=>a+b,0)/validVals.length:0;
        if(avgVal>1000){
          recs.forEach(r=>{
            r.basicOrderValue=+(parseFloat(r.basicOrderValue||0)/100000).toFixed(2);
            r.basicOVL=r.basicOrderValue;
            r.totalOrderValue=+(parseFloat(r.totalOrderValue||0)/100000).toFixed(2);
          });
        }
        res({recs,map,hdrs:cols});
      } catch(e){rej(new Error('Parse error: '+e.message));}
    };
    sc.onerror=()=>{cleanup();rej(new Error('Failed to load sheet script. Check the Sheet ID.'));};
    sc.src=url; document.head.appendChild(sc);
  });
}
function fetchGAS(deployId, id, tab) {
  return new Promise((res,rej)=>{
    const cb='__ozGAS'+Date.now();
    const url='https://script.google.com/macros/s/'+deployId+'/exec?action=getData&sheetId='+id+'&tab='+(tab||'')+'&callback='+cb;
    const sc=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('GAS timeout.'));},20000);
    function cleanup(){clearTimeout(t);sc.remove();try{delete window[cb];}catch(e){}}
    window[cb]=function(d){
      cleanup();
      if(d.error) return rej(new Error('GAS: '+d.error));
      const map=autoMap(d.headers||[]);
      const allRecs=(d.rows||[]).map((row,i)=>rowToRec(row,map,i+1));
      const recs=allRecs.filter(r=>
        (r.sno&&r.sno>0) ||
        (r.customer&&r.customer.trim()) ||
        (r.quotationNo&&r.quotationNo.trim()) ||
        (r.basicOrderValue&&parseFloat(r.basicOrderValue)>0)
      );
      // Auto-detect scale: if avg > 1000 → rupees, convert to lakhs
      const validVals=recs.map(r=>parseFloat(r.basicOrderValue)||0).filter(v=>v>0);
      const avgVal=validVals.length?validVals.reduce((a,b)=>a+b,0)/validVals.length:0;
      if(avgVal>1000){
        recs.forEach(r=>{
          r.basicOrderValue=+(parseFloat(r.basicOrderValue||0)/100000).toFixed(2);
          r.basicOVL=r.basicOrderValue;
          r.totalOrderValue=+(parseFloat(r.totalOrderValue||0)/100000).toFixed(2);
        });
      }
      res({recs,map,hdrs:d.headers||[]});
    };
    sc.onerror=()=>{cleanup();rej(new Error('GAS script failed.'));};
    sc.src=url; document.head.appendChild(sc);
  });
}
async function doConnect() {
  const id = extractId(S.sheetId);
  if (!id) { set({sheetErr:'Invalid URL or Sheet ID. Paste the full Google Sheets URL.'}); return; }
  set({syncing:true, sheetErr:''});
  try {
    let r;
    if (S.gasId) { try { r = await fetchGAS(S.gasId,id,S.sheetTab); } catch(e){ r = await fetchGViz(id,S.sheetTab); } }
    else { r = await fetchGViz(id,S.sheetTab); }
    localStorage.setItem('oz_sheet',id);
    if (S.gasId) localStorage.setItem('oz_gas',S.gasId);
    // After scaling, store clean data
  set({connected:true,syncing:false,sheetErr:'',liveData:r.recs,colMap:r.map,sheetHeaders:r.hdrs,lastSync:new Date().toLocaleTimeString('en-IN'),sheetId:id,wizStep:4});
  } catch(e) {
    set({syncing:false,sheetErr:e.message,connected:false});
  }
}
setInterval(()=>{ if(S.connected) doConnect(); },5*60*1000);

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function escapeCSV(v) {
  var s = String(v == null ? '' : v);
  if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
function toCSV(headers, rows) {
  var lines = [headers.map(escapeCSV).join(',')];
  for (var i = 0; i < rows.length; i++) {
    lines.push(rows[i].map(escapeCSV).join(','));
  }
  return lines.join('\r\n');
}
function downloadCSV(filename, headers, rows) {
  var csv = toCSV(headers, rows);
  var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename + '.csv'; a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}
function downloadExcel(filename, headers, rows) {
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  var th = headers.map(function(h){ return '<th>' + esc(h) + '</th>'; }).join('');
  var tb = rows.map(function(r){
    return '<tr>' + r.map(function(v){ return '<td>' + esc(v) + '</td>'; }).join('') + '</tr>';
  }).join('');
  var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office"'
    + ' xmlns:x="urn:schemas-microsoft-com:office:excel">'
    + '<head><meta charset="UTF-8"><style>'
    + 'body{font-family:Arial,sans-serif;font-size:11px}'
    + 'th{background:#1e3a5f;color:#fff;border:1px solid #999;padding:5px;font-weight:bold}'
    + 'td{border:1px solid #ccc;padding:4px}'
    + '</style></head><body>'
    + '<table><thead><tr>' + th + '</tr></thead><tbody>' + tb + '</tbody></table>'
    + '</body></html>';
  var blob = new Blob([html], {type: 'application/vnd.ms-excel;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename + '.xls'; a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}
function exportPrint(filename, headers, rows) {
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  var th = headers.map(function(h){ return '<th>' + esc(h) + '</th>'; }).join('');
  var tb = rows.map(function(r){
    return '<tr>' + r.map(function(v){ return '<td>' + esc(v) + '</td>'; }).join('') + '</tr>';
  }).join('');
  var win = window.open('', '_blank');
  win.document.write(
    '<html><head><title>' + esc(filename) + '</title>'
    + '<style>'
    + 'body{font-family:Arial,sans-serif;font-size:11px;margin:20px}'
    + 'h2{color:#1e3a5f;margin-bottom:6px}'
    + '.meta{color:#666;font-size:10px;margin-bottom:14px}'
    + 'table{border-collapse:collapse;width:100%}'
    + 'th{background:#1e3a5f;color:#fff;padding:6px 8px;text-align:left;font-size:11px}'
    + 'td{padding:5px 8px;border-bottom:1px solid #eee;font-size:11px}'
    + 'tr:nth-child(even){background:#f8f8f8}'
    + '@media print{body{margin:0}}'
    + '</style></head><body>'
    + '<h2>' + esc(filename) + '</h2>'
    + '<div class="meta">Generated: ' + new Date().toLocaleString('en-IN') + ' &nbsp;|&nbsp; ' + rows.length + ' records</div>'
    + '<table><thead><tr>' + th + '</tr></thead><tbody>' + tb + '</tbody></table>'
    + '</body></html>'
  );
  win.document.close();
  setTimeout(function(){ win.print(); }, 400);
}

function renderDashboard() {
  const data = filtered();
  const done = data.filter(r=>r.status==='Done');
  const pend = data.filter(r=>r.status!=='Done');
  const totalVal = sum(data,'basicOrderValue');
  const doneVal  = sum(done,'basicOrderValue');
  const pendVal  = sum(pend,'basicOrderValue');
  const totalQty = sum(data,'totalQty');
  // Product matching: check masterProducts first, then partial match
  const alumProd = S.masterProducts.find(p=>p.toLowerCase().includes('alum'))||'Aluminium Doors & Windows';
  const upvcProd = S.masterProducts.find(p=>p.toLowerCase().includes('upvc'))||'UPVC Windows';
  const isAlum = r => r.product && (r.product===alumProd || r.product.toLowerCase().includes('alum'));
  const isUpvc = r => r.product && (r.product===upvcProd || r.product.toLowerCase().includes('upvc'));
  const alumQty  = sum(data.filter(isAlum),'totalQty');
  const upvcQty  = sum(data.filter(isUpvc),'totalQty');

  function kpi(label,val,sub,color) {
    return el('div',{cls:'kpi-card '+color},
      el('div',{cls:'kpi-label'},label),
      el('div',{cls:'kpi-value'},String(val)),
      sub ? el('div',{cls:'kpi-sub'},sub) : null
    );
  }

  // Monthly bar chart (SVG)
  const mdata = MONTHS.map(m => {
    const md = data.filter(d=>d.month===m);
    return {m:m.slice(0,3), v:sum(md,'basicOrderValue'), n:md.length};
  }).filter(d=>d.n>0);
  const maxV = Math.max(...mdata.map(d=>d.v),1);
  const W=440,H=120,bw=mdata.length?Math.max(6,Math.floor((W-mdata.length*3)/mdata.length)):18;
  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+(H+22));
  svg.style.width='100%'; svg.style.height=(H+22)+'px';
  mdata.forEach((d,i)=>{
    const bh=Math.max(2,Math.round(d.v/maxV*(H-6)));
    const x=i*(bw+3)+2;
    const r=document.createElementNS(svgNS,'rect');
    r.setAttribute('x',x);r.setAttribute('y',H-bh);r.setAttribute('width',bw);r.setAttribute('height',bh);
    r.setAttribute('rx','2');r.setAttribute('fill','#2563eb');r.setAttribute('opacity','0.75');
    svg.appendChild(r);
    const t=document.createElementNS(svgNS,'text');
    t.setAttribute('x',x+bw/2);t.setAttribute('y',H+14);t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','9');t.setAttribute('fill','#94a3b8');t.textContent=d.m;
    svg.appendChild(t);
  });

  // Zone progress
  const zoneRows = ZONES.map(z=>{
    const zd=data.filter(d=>d.zone===z);
    return {zone:z,orders:zd.length,val:sum(zd,'basicOrderValue')};
  }).filter(r=>r.orders>0).sort((a,b)=>b.val-a.val);

  // Status breakdown
  const stMap={};
  data.forEach(r=>{stMap[r.status]=(stMap[r.status]||0)+1;});
  const stEntries=Object.entries(stMap).sort((a,b)=>b[1]-a[1]);

  // Top partners

function renderOrders() {
  const PER=20;
  const data=filtered();
  const sk=S.ordSort.k,sd=S.ordSort.d;
  data.sort((a,b)=>{
    const av=a[sk]??'',bv=b[sk]??'';
    if(!isNaN(av)&&!isNaN(bv)) return (parseFloat(av)-parseFloat(bv))*sd;
    return String(av).localeCompare(String(bv))*sd;
  });
  const pages=Math.max(1,Math.ceil(data.length/PER));
  const pg=Math.min(S.ordPage,pages);
  const rows=data.slice((pg-1)*PER,pg*PER);
  function sth(k,lbl) {
    const active=S.ordSort.k===k;
    return el('th',{cls:'sortable',onclick:()=>set({ordSort:{k,d:active?-sd:1}})},
      lbl+' '+(active?sd===1?'↑':'↓':''));
  }
  const pgBtns=[];
  const s=Math.max(1,pg-2),e=Math.min(pages,pg+2);
  if(s>1){pgBtns.push(el('button',{cls:'pg-btn',onclick:()=>set({ordPage:1})},'1'));if(s>2)pgBtns.push(txt('…'));}
  for(let i=s;i<=e;i++) pgBtns.push(el('button',{cls:'pg-btn'+(i===pg?' on':''),onclick:(p=>()=>set({ordPage:p}))(i)},i));
  if(e<pages){if(e<pages-1)pgBtns.push(txt('…'));pgBtns.push(el('button',{cls:'pg-btn',onclick:()=>set({ordPage:pages})},pages));}

  return el('div',{id:'page-body'},
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}},
      el('span',{cls:'muted'},data.length+' records · Page '+pg+' of '+pages),
      el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
        ExportMenu('Orders_'+new Date().toISOString().slice(0,10), ()=>({
          h:['S.No','Date','Quotation No.','Customer','Partner','Product','Zone','Sales Person','Qty','Basic Value (₹L)','Total Value (₹L)','Status'],
          r:data.map(r=>[r.sno,r.dateOfOrder,r.quotationNo,r.customer,r.partner,r.product,r.zone,r.salesPerson,r.totalQty,(parseFloat(r.basicOrderValue)||0).toFixed(2),(parseFloat(r.totalOrderValue)||0).toFixed(2),r.status])
        })),
        el('button',{cls:'btn btn-primary btn-sm',onclick:()=>set({page:'punch'})},'+ New Order')
      )
    ),
    el('div',{cls:'panel'},
      el('div',{cls:'tbl-wrap'},
        el('table',{},
          el('thead',{},el('tr',{},
            sth('sno','#'), sth('dateOfOrder','Date'), sth('quotationNo','Quotation No.'),
            sth('customer','Customer'), sth('partner','Partner'), sth('product','Product'),
            sth('zone','Zone'), sth('salesPerson','Sales Person'),
            sth('totalQty','Qty'), sth('basicOrderValue','Value (₹L)'),
            el('th',{},'Status'), el('th',{},'')
          )),
          el('tbody',{},
            rows.length ? rows.map(r=>el('tr',{},
              el('td',{cls:'muted'},r.sno),
              el('td',{},r.dateOfOrder||'—'),
              el('td',{cls:'primary'},r.quotationNo||'—'),
              el('td',{},r.customer||'—'),
              el('td',{},r.partner||'—'),
              el('td',{},r.product||'—'),
              el('td',{},r.zone||'—'),
              el('td',{},r.salesPerson||'—'),
              el('td',{cls:'num'},r.totalQty||0),
              el('td',{cls:'num',style:{fontWeight:'600'}},(parseFloat(r.basicOrderValue)||0).toFixed(2)),
              el('td',{html:statusBadge(r.status||'Pending')}),
              el('td',{},el('button',{cls:'btn btn-secondary btn-sm',onclick:()=>openEdit(r)},'Edit'))
            )) :

function openEdit(r) {
  S.editRow = {...r};
  showModal(r);
}
function showModal(orig) {
  const old=document.getElementById('modal-overlay'); if(old)old.remove();
  const row={...orig};
  const sections=[
    {t:'Order Info',       ks:['sno','dateOfOrder','quotationNo','invoiceNo','soNumber','status','enquirySource','itemType','month','quarter','year','weeks']},
    {t:'Customer',         ks:['customer','custCode','partner','address','location','installBy']},
    {t:'Product & Qty',    ks:['product','product1','category','color','totalQty','mesh']},
    {t:'Commercial',       ks:['basicOrderValue','basicOVL','totalOrderValue','advance','survey','despatch']},
    {t:'Team Assignment',  ks:['zone','zm','rsm','salesPerson']},
    {t:'Payment — Advance',ks:['advPct','advAmt','advTxn','advDate','advReceipt','advRecAmt','advRecDate']},
    {t:'Survey & Won',     ks:['techVal','techValDate','markedWon','wonTrigger','informService','clientAppt','tentSurvey','surveyDate','siteVisit','surveyReport','survPayPct','survPayAmt','survPayTxn','survPayDate','postSurvPct','postSurvAmt','postSurvDate']},
    {t:'Production',       ks:['finalRevOrder','fgCodeReq','sapFgCode','soDate','prodOrderDate','prodDrawing','factoryStatus','partialComplete','matAvail','prodSchedule','expProdDate','prodConfSAP','remarks1']},
    {t:'Dispatch',         ks:['payFollowUp','despPayPct','despPayAmt','despPayTxn','despPayDate','preDelPct','preDelAmt','preDelDate','despClearEmail','despatchDate','infoPartner']},
    {t:'Installation & Close',ks:['siteReceipt','paidReorder','focReorder','installStart','installEnd','audit','handover']},
    {t:'Notes',            ks:['remarks','orderSummary','finalRemark']},
  ];
  const MODAL_DYNA = {
    zone: S.masterZones, status: S.masterStatuses,
    product: S.masterProducts, partner: S.masterPartners, salesPerson: S.masterSalesPpl,
  };
  function mkField(key) {
    const s=SMAP[key]; if(!s) return null;
    const val=row[key]??'';
    let inp;
    if(s.t==='sel'){
      const opts = MODAL_DYNA[key] || s.o || [];
      inp=el('select',{onchange:e=>row[key]=e.target.value},
        ...opts.map(o=>{const opt=el('option',{value:o},o);if(String(o)===String(val))opt.selected=true;return opt;})
      );
    } else if(s.t==='area'){
      inp=el('textarea',{rows:2,oninput:e=>row[key]=e.target.value},val);
    } else {
      inp=el('input',{type:s.t==='date'?'date':'text',value:val,oninput:e=>row[key]=e.target.value});
    }
    return el('div',{cls:'field'},el('label',{},s.l),inp);
  }
  const overlay=el('div',{cls:'modal-overlay',id:'modal-overlay'},
    el('div',{cls:'modal-box'},
      el('div',{cls:'modal-header'},
        el('span',{cls:'modal-title'},'Edit Order — '+(orig.quotationNo||'#'+orig.sno)),
        el('button',{cls:'modal-close',onclick:()=>overlay.remove()},'×')
      ),
      el('div',{cls:'modal-body'},
        ...sections.map(sec=>{
          const fields=sec.ks.map(k=>mkField(k)).filter(Boolean);
          if(!fields.length) return null;
          return el('div',{},
            el('div',{cls:'modal-section-title'},sec.t),
            el('div',{cls:'modal-grid'},...fields)
          );
        })
      ),
      el('div',{cls:'modal-footer'},
        el('button',{cls:'btn btn-secondary',onclick:()=>overlay.remove()},'Cancel'),
        el('button',{cls:'btn btn-primary',onclick:()=>{
          // Try liveData first, then DEMO, then sessionOrders
          let saved = false;
          if(S.liveData) {
            const i=S.liveData.findIndex(r=>String(r.sno)===String(orig.sno));
            if(i>=0){S.liveData[i]=row;saved=true;}
          }
          if(!saved){
            const i=DEMO.findIndex(r=>String(r.sno)===String(orig.sno));
            if(i>=0){DEMO[i]=row;saved=true;}
          }
          if(!saved){
            const si=S.sessionOrders.findIndex(r=>String(r.sno)===String(orig.sno));
            if(si>=0)S.sessionOrders[si]=row;
          }
          overlay.remove();
          draw();
        }},'Save Changes')
      )
    )
  );
  document.body.appendChild(overlay);
}

function renderPunch() {
  const draft={};
  SCH.forEach(s=>draft[s.k]='');
  draft.sno = Date.now(); // unique ID; will be overwritten by sheet row number when synced
  draft.year='2024'; draft.advance=30; draft.survey=20; draft.despatch=50;
  const sucMsg=el('div',{cls:'alert alert-success',style:{display:'none'}},'✓ Order created. Redirecting to orders…');
  const sections=[
    {t:'Order Info',   ks:['dateOfOrder','quotationNo','month','quarter','year','status','enquirySource','itemType']},
    {t:'Customer',     ks:['customer','custCode','partner','address','location']},
    {t:'Product',      ks:['product','category','color','totalQty','installBy']},
    {t:'Commercial',   ks:['basicOrderValue','totalOrderValue','advance','survey','despatch']},
    {t:'Team',         ks:['zone','zm','rsm','salesPerson']},
    {t:'Notes',        ks:['techVal','remarks','finalRemark']},
  ];
  // Use master data for dynamic dropdowns so any admin changes reflect here
  const DYNA_OPTS = {
    zone:S.masterZones, status:S.masterStatuses,
    product:S.masterProducts, partner:S.masterPartners, salesPerson:S.masterSalesPpl,
  };
  function mkField(key) {
    const s=SMAP[key]; if(!s) return null;
    let inp;
    if(s.t==='sel'){
      const opts = DYNA_OPTS[key] || s.o || [];
      inp=el('select',{onchange:e=>draft[key]=e.target.value},
        el('option',{value:''},'— Select —'),
        ...opts.map(o=>el('option',{value:o},o))
      );
    } else if(s.t==='area'){
      inp=el('textarea',{rows:2,oninput:e=>draft[key]=e.target.value});
    } else {
      inp=el('input',{type:s.t==='date'?'date':'text',oninput:e=>draft[key]=e.target.value});
    }
    return el('div',{cls:'field'},el('label',{},s.l),inp);
  }
  return el('div',{id:'page-body'},
    sucMsg,
    ...sections.map(sec=>
      el('div',{cls:'form-section'},
        el('div',{cls:'form-section-title'},sec.t),
        el('div',{cls:'form-row'},...sec.ks.map(k=>mkField(k)).filter(Boolean))
      )
    ),
    el('div',{cls:'form-footer'},
      el('button',{cls:'btn btn-secondary',onclick:()=>set({page:'orders'})},'Cancel'),
      el('button',{cls:'btn btn-primary',onclick:()=>{
        if(!draft.customer&&!draft.quotationNo){alert('Customer Name or Quotation Number is required.');return;}
        draft.basicOrderValue=parseFloat(draft.basicOrderValue)||0;
        const gst = 1 + (S.businessRules.gstRate||18)/100;
        draft.totalOrderValue=parseFloat(draft.totalOrderValue)||+(draft.basicOrderValue*gst).toFixed(2);
        draft.totalQty=parseInt(draft.totalQty)||0;
        S.sessionOrders.push({...draft});
        sucMsg.style.display='block';
        setTimeout(()=>set({page:'orders'}),1000);
      }},'Create Order')
    )
  );
}

/* ═══════════════════════════════════════════════════════
   FUNNEL
═══════════════════════════════════════════════════════ */
function renderFunnel() {
  const data=filtered();
  // Build funnel dynamically from masterStatuses order
  const ST = S.masterStatuses;
  const doneIdx   = ST.indexOf('Done');
  const instIdx   = ST.indexOf('Installation');
  const dispIdx   = ST.indexOf('Dispatch');
  const prodIdx   = ST.indexOf('Production');
  const survIdx   = ST.indexOf('Survey');
  const wonIdx    = ST.indexOf('Mark as Won');
  const quoteIdx  = ST.indexOf('Quotation Sent');
  // Statuses that count as "at or past" a stage = all statuses from that index onwards + Done
  function atOrPast(idx){ return idx<0?[]:ST.slice(idx); }
  const stages=[
    {label:'Total Enquiries',   fn:r=>true,                                        bg:'#1e3a5f'},
    {label:'Quotation Sent',    fn:r=>atOrPast(quoteIdx).includes(r.status)||r.status==='Done', bg:'#1e4d8c'},
    {label:'Mark as Won',       fn:r=>atOrPast(wonIdx).includes(r.status)||r.status==='Done',   bg:'#2563eb'},
    {label:'Survey Completed',  fn:r=>atOrPast(survIdx).includes(r.status)||r.status==='Done',  bg:'#1d4ed8'},
    {label:'In Production',     fn:r=>atOrPast(prodIdx).includes(r.status)||r.status==='Done',  bg:'#1e40af'},
    {label:'Dispatched',        fn:r=>atOrPast(dispIdx).includes(r.status)||r.status==='Done',  bg:'#1e3a8a'},
    {label:'Installation',      fn:r=>atOrPast(instIdx).includes(r.status)||r.status==='Done',  bg:'#312e81'},
    {label:'Completed (Done)',  fn:r=>r.status==='Done',                                        bg:'#16a34a'},
  ];
  return el('div',{id:'page-body'},
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}},
      el('p',{cls:'section-hint',style:{margin:0}},'Cumulative order lifecycle from enquiry through completion.'),
      ExportMenu('Sales_Funnel', ()=>({
        h:['Stage','Count','% of Total','Value (₹L)'],
        r:stages.map(s=>{const m=data.filter(s.fn);return[s.label,m.length,pct(m.length,data.length||1)+'%',sum(m,'basicOrderValue').toFixed(2)];})
      }))
    ),
    el('div',{cls:'funnel-wrap'},
      ...stages.flatMap((stage,i)=>{
        const matched=data.filter(stage.fn);
        const w=Math.max(36,100-i*8);
        const items=[el('div',{cls:'funnel-row'},
          el('div',{cls:'funnel-bar',style:{width:w+'%',background:stage.bg}},
            el('div',{style:{fontWeight:'600'}},stage.label),
            el('div',{style:{textAlign:'right',fontSize:'12px'}},
              el('span',{style:{fontSize:'16px',fontWeight:'700',marginRight:'6px'}},matched.length),
              pct(matched.length,data.length||1)+'% · '+fmtL(sum(matched,'basicOrderValue'))
            )
          )
        )];
        if(i<stages.length-1) items.push(el('div',{cls:'funnel-gap'}));
        return items;
      })
    )
  );
}

function renderPartners() {
  const data=filtered();
  const parts=[...new Set(data.map(r=>r.partner).filter(Boolean))];
  const rows=parts.map(p=>{

const GAS_SCRIPT=`function doGet(e) {
  var id  = e.parameter.sheetId;
  var tab = e.parameter.tab || "";
  var cb  = e.parameter.callback || "cb";
  try {
    var ss    = SpreadsheetApp.openById(id);
    var sheet = tab ? ss.getSheetByName(tab) : ss.getSheets()[0];
    var vals  = sheet.getDataRange().getValues();
    var out   = JSON.stringify({
      headers: vals[0].map(String),
      rows:    vals.slice(1).map(function(r){ return r.map(String); })
    });
    return ContentService
      .createTextOutput(cb + "(" + out + ")")
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  } catch(err) {
    return ContentService
      .createTextOutput(cb + '({"error":"' + err.message + '"})')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
}`;

        el('div',{cls:'panel-body'},
          el('div',{cls:'alert alert-info',style:{marginBottom:'14px'}},'Enable or disable filter axes shown in the filter bar across all report pages.'),
          ...FILTER_DEF.map(f=>el('div',{cls:'toggle-row'},
            el('div',{},
              el('div',{cls:'toggle-label'},f.label),
              el('div',{cls:'toggle-sub'},f.note)
            ),
            el('label',{cls:'toggle-switch'},
              el('input',{type:'checkbox',...(S.filterConfig[f.id]?{checked:''}:{}),onchange:()=>{S.filterConfig[f.id]=!S.filterConfig[f.id];draw();}}),
              el('span',{cls:'toggle-track'})
            )
          ))
        )
      )
    );
  }

  /* ── USER MANAGEMENT ──────────────────────────────────────────── */
  else if (t==='users') {
    let newUser = {username:'',name:'',role:'Sales',access:'reports',active:true};
    const addSection = el('div',{cls:'panel',style:{marginBottom:'14px'}},
      el('div',{cls:'panel-header'},el('span',{cls:'panel-title'},'Add New User')),
      el('div',{cls:'panel-body'},
        el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:'10px',alignItems:'flex-end'}},
          el('div',{cls:'field'},el('label',{},'Username'),
            el('input',{type:'text',placeholder:'e.g. john.smith',oninput:e=>newUser.username=e.target.value})
          ),
          el('div',{cls:'field'},el('label',{},'Full Name'),
            el('input',{type:'text',placeholder:'e.g. John Smith',oninput:e=>newUser.name=e.target.value})
          ),
          el('div',{cls:'field'},el('label',{},'Role'),
            el('select',{onchange:e=>newUser.role=e.target.value},
              el('option',{value:'Sales'},'Sales'),
              el('option',{value:'Operations'},'Operations'),
              el('option',{value:'Admin'},'Admin')
            )
          ),
          el('button',{cls:'btn btn-primary',onclick:()=>{
            if(!newUser.username||!newUser.name){alert('Username and Full Name are required.');return;}
            const exists=S.masterUsers.find(u=>u.username===newUser.username);
            if(exists){alert('Username already exists.');return;}
            S.masterUsers.push({...newUser,id:Date.now()});
            draw();
          }},'Add User')
        )
      )
    );
    body = el('div',{},
      el('div',{cls:'alert alert-info',style:{marginBottom:'14px'}},'Admin users have full access including Settings. Sales and Operations users have read-only access to reports and dashboards only.'),
      addSection,
      el('div',{cls:'panel'},
        el('div',{cls:'panel-header'},
          el('span',{cls:'panel-title'},'Platform Users'),
          el('span',{cls:'panel-meta'},S.masterUsers.length+' users')
        ),
        el('div',{cls:'tbl-wrap'},
          el('table',{},
            el('thead',{},el('tr',{},el('th',{},'Status'),el('th',{},'Username'),el('th',{},'Full Name'),el('th',{},'Role'),el('th',{},'Module Access'),el('th',{},'Actions'))),
            el('tbody',{},...S.masterUsers.map(u=>el('tr',{},
              el('td',{},el('span',{cls:'user-status-dot '+(u.active?'dot-on':'dot-off')}),u.active?'Active':'Inactive'),
              el('td',{cls:'mono'},u.username),
              el('td',{style:{fontWeight:'500'}},u.name),
              el('td',{},el('span',{cls:'badge '+(u.role==='Admin'?'b-done':u.role==='Sales'?'b-survey':'b-prod')},u.role)),
              el('td',{cls:'muted',style:{fontSize:'11px'}},
                u.role==='Admin'?'Full access — all modules including Settings':
                u.role==='Sales'?'Dashboard, Orders, New Order, Analytics, Funnel, Partners, Payments':
                'Dashboard, Orders, Analytics, Funnel, Partners, Payments'
              ),
              el('td',{},
                u.role==='Admin'&&u.id===1 ? el('span',{cls:'muted',style:{fontSize:'11px'}},'Protected') :
                el('div',{style:{display:'flex',gap:'4px'}},
                  el('button',{cls:'btn btn-secondary btn-sm',onclick:()=>{
                    u.active=!u.active; draw();
                  }},u.active?'Deactivate':'Activate'),
                  el('button',{cls:'btn btn-danger btn-sm',onclick:()=>{
                    if(confirm('Remove user '+u.username+'?')){
                      S.masterUsers=S.masterUsers.filter(x=>x.id!==u.id);draw();
                    }
                  }},'Remove')
                )
              )
            )))
          )
        )
      )
    );
  }

  /* ── MASTER DATA ──────────────────────────────────────────────── */
  else if (t==='masterdata') {
    function tagPanel(title, stateKey, hint) {
      const items = S[stateKey] || [];
      let newVal = '';
      const addInp = el('input',{type:'text',placeholder:'Add new item…',oninput:e=>newVal=e.target.value});
      return el('div',{cls:'panel',style:{marginBottom:'14px'}},
        el('div',{cls:'panel-header'},el('span',{cls:'panel-title'},title),el('span',{cls:'panel-meta'},items.length+' items')),
        el('div',{cls:'panel-body'},
          hint&&el('p',{style:{fontSize:'12px',color:'#64748b',marginBottom:'10px'}},hint),
          el('div',{cls:'tag-list'},
            ...items.map((item,i)=>el('span',{cls:'tag'},item,
              el('button',{cls:'tag-del',onclick:()=>{
                if(items.length<=1){alert('Cannot remove the last item.');return;}
                S[stateKey]=items.filter((_,j)=>j!==i); draw();
              }},'×')
            ))
          ),
          el('div',{cls:'tag-add-row'},
            addInp,
            el('button',{cls:'btn btn-secondary btn-sm',onclick:()=>{
              const v=newVal.trim();
              if(!v)return;
              if(items.includes(v)){alert('Item already exists.');return;}
              S[stateKey]=[...items,v]; addInp.value=''; draw();
            }},'+ Add')
          )
        )
      );
    }
    body = el('div',{},
      el('div',{cls:'alert alert-info',style:{marginBottom:'14px'}},'Manage reference data used in dropdowns and filters across the platform. Changes apply to all new forms immediately.'),
      el('div',{cls:'settings-grid'},
        tagPanel('Zones',         'masterZones',    'Zones are used for regional filtering and reporting.'),
        tagPanel('Order Statuses','masterStatuses', 'Statuses drive the sales funnel stages and order lifecycle.'),
        tagPanel('Products',      'masterProducts',  'Product categories used in KPI breakdowns and filters.'),
        tagPanel('Partners',      'masterPartners',  'Ozo Blu partner names as registered in SAP.'),
        tagPanel('Sales Personnel','masterSalesPpl', 'Sales team members for leaderboard and order assignment.'),
      )
    );
  }

  /* ── BUSINESS RULES ───────────────────────────────────────────── */
  else if (t==='rules') {
    const rules = [
      {k:'advancePct',  label:'Advance Payment %',       note:'Default % of order value required as advance',    min:0,max:100},
      {k:'surveyPct',   label:'Survey Stage Payment %',   note:'Default % payable at survey stage',               min:0,max:100},
      {k:'despatchPct', label:'Despatch Payment %',       note:'Default % payable before despatch',               min:0,max:100},
      {k:'gstRate',     label:'GST Rate %',               note:'Applied to Basic Order Value to get Total Order Value',min:0,max:30},
    ];
    function validateRules(){
      const {advancePct:a,surveyPct:s,despatchPct:d}=S.businessRules;
      if(a+s+d!==100) return 'Advance + Survey + Despatch must total 100%. Current total: '+(a+s+d)+'%';
      return null;
    }
    const ruleErr=validateRules();
    body = el('div',{},
      el('div',{cls:'alert alert-info',style:{marginBottom:'14px'}},'Configure default payment percentages and commercial rules. These values populate payment fields in new orders and drive payment tracker calculations.'),
      ruleErr&&el('div',{cls:'alert alert-warn',style:{marginBottom:'14px'}},'⚠ '+ruleErr),
      el('div',{cls:'panel'},
        el('div',{cls:'panel-header'},el('span',{cls:'panel-title'},'Payment & Commercial Rules')),
        el('div',{cls:'panel-body'},
          ...rules.map(r=>{
            const inp=el('input',{cls:'rule-inp',type:'number',min:r.min,max:r.max,value:S.businessRules[r.k],onchange:e=>{
              S.businessRules[r.k]=parseInt(e.target.value)||0; draw();
            }});
            return el('div',{cls:'rule-row'},
              el('div',{},el('div',{style:{fontWeight:'500',fontSize:'13px'}},r.label),el('div',{style:{fontSize:'11px',color:'#64748b'}},r.note)),
              el('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},inp,el('span',{cls:'muted'},'%'))
            );
          }),
          el('div',{style:{marginTop:'14px',padding:'12px',background:'#f8fafc',borderRadius:'5px',fontSize:'12px',color:'#374151'}},
            el('strong',{},'Current totals: '),
            'Payment stages: '+(S.businessRules.advancePct+S.businessRules.surveyPct+S.businessRules.despatchPct)+'%  ·  ',
            'Total Order Value = Basic Value × '+(1+S.businessRules.gstRate/100).toFixed(2),
            ' (GST '+S.businessRules.gstRate+'%)'
          )
        )
      ),
      el('div',{cls:'panel'},
        el('div',{cls:'panel-header'},el('span',{cls:'panel-title'},'Funnel Stage Configuration')),
        el('div',{cls:'panel-body'},
          el('p',{style:{fontSize:'12px',color:'#64748b',marginBottom:'12px'}},'The funnel is driven by Status values. Edit the master statuses in the Master Data tab to update funnel stages.'),
          el('div',{cls:'tbl-wrap'},
            el('table',{},
              el('thead',{},el('tr',{},el('th',{},'Stage'),el('th',{},'Status Values Included'))),
              el('tbody',{},
                ...[
                  ['Total Enquiries','All orders'],
                  ['Quotation Sent','Quotation Sent → onwards'],
                  ['Mark as Won','Mark as Won → onwards'],
                  ['Survey Completed','Survey → onwards'],
                  ['In Production','Production → onwards'],
                  ['Dispatched','Dispatch → onwards'],
                  ['Installation','Installation → onwards'],
                  ['Completed','Done only'],
                ].map(([s,v])=>el('tr',{},el('td',{style:{fontWeight:'500'}},s),el('td',{cls:'muted'},v)))
              )
            )
          )
        )
      )
    );
  }

  return el('div',{id:'page-body'},
    el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},
      el('h2',{style:{fontSize:'15px',fontWeight:'600',color:'#1a1f36'}},'Settings & Administration'),
      el('span',{cls:'admin-only-badge'},'🔒 Admin Only')
    ),
    el('p',{cls:'section-hint'},'Manage data source, column mappings, KPI visibility, filters, users, master data, and business rules.'),
    tabBar, body
  );
}

const PAGE_FN = {dashboard:renderDashboard,orders:renderOrders,punch:renderPunch,analytics:renderAnalytics,funnel:renderFunnel,partners:renderPartners,payments:renderPayments,settings:renderSettings};
const SHOW_FILTER = new Set(['dashboard','orders','analytics','funnel','partners','payments']);

// Role permissions matrix
const ROLE_PAGES = {
  'Admin':      new Set(['dashboard','orders','punch','analytics','funnel','partners','payments','settings']),
  'Sales':      new Set(['dashboard','orders','punch','analytics','funnel','partners','payments']),
  'Operations': new Set(['dashboard','orders','analytics','funnel','partners','payments']),
};
function canAccess(page) {
  const allowed = ROLE_PAGES[S.user?.role] || ROLE_PAGES['Operations'];
  return allowed.has(page);
}

function renderAccessDenied() {
  return el('div',{id:'page-body'},
    el('div',{cls:'access-denied'},
      el('div',{cls:'ad-icon'},'🔒'),
      el('h2',{},'Access Restricted'),
      el('p',{},'This section is restricted to Administrators only. Contact your system administrator if you need access.')
    )
  );
}

function draw() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  if (!S.user) { root.appendChild(renderLogin()); return; }
  // Redirect if current page is not allowed for this role
  if (!canAccess(S.page)) { S.page = 'dashboard'; }
  const fn = canAccess(S.page) ? (PAGE_FN[S.page] || renderDashboard) : renderAccessDenied;
  const shell = el('div',{id:'shell'},
    renderSidebar(),
    el('div',{id:'content-area'},
      renderTopbar(),
      SHOW_FILTER.has(S.page) ? renderFilters() : null,
      fn()
    )
  );
  root.appendChild(shell);
}

draw();
</script>
</body>
</html>
